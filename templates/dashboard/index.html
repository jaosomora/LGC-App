            <svg class="w-8 h-8 text-th-accent" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">

        <div>

            <p class="text-th-text/50 text-sm leading-relaxed">
                Estamos construyendo tu espacio personal. Pronto podrás ver tus métricas,
                historial de búsquedas y mucho más.
            </p>
        </div>

        <a href="/" class="glass-button-primary inline-flex items-center gap-2 mx-auto">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/></svg>
