<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block meta %}{% endblock %}

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/img/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/img/apple-touch-icon.png">

    <title>{% block title %}Interfaz LGC{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/output.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      (function(){
        var t = localStorage.getItem('lgc_theme');
        if (!t) t = matchMedia('(prefers-color-scheme:light)').matches ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    {% block head %}{% endblock %}
</head>
<body class="min-h-screen flex flex-col bg-th-bg text-th-text font-sans antialiased">

    <!-- Orbes de fondo animados -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none -z-10" aria-hidden="true">
        <div class="absolute w-[500px] h-[500px] rounded-full blur-[120px] -top-48 -left-48 animate-float-slow" style="background:var(--orb-1)"></div>
        <div class="absolute w-[400px] h-[400px] rounded-full blur-[100px] top-1/2 -right-48 animate-float-slower" style="background:var(--orb-2)"></div>
        <div class="absolute w-[300px] h-[300px] rounded-full blur-[80px] bottom-20 left-1/3 animate-float-medium" style="background:var(--orb-3)"></div>
    </div>

    {% block body %}{% endblock %}

    {% block scripts %}{% endblock %}
</body>
</html>
