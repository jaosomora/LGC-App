{% extends "base.html" %}

{% block body %}
    <!-- Header -->
    <header class="glass-panel sticky top-0 z-50 border-b border-th">
        <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/" class="text-xl font-bold tracking-tight">
                <span class="text-th-text">Interfaz</span><span class="text-th-accent">LGC</span>
            </a>
            <nav class="flex items-center gap-3 text-sm">
                <a href="https://t.me/+2r4BtHRNc5A4MzYx" target="_blank" rel="noopener"
                   class="text-th-text/50 hover:text-th-text transition-colors">Novedades</a>
                <button id="theme-toggle" class="p-1.5 rounded-lg text-th-text/50 hover:text-th-text transition-colors" aria-label="Cambiar tema">
                    <svg id="icon-sun" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    <svg id="icon-moon" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                </button>
            </nav>
        </div>
    </header>

    <!-- Contenido principal -->
    <main class="flex-1 max-w-3xl mx-auto w-full px-4 py-6 sm:py-10 space-y-6">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="glass-panel border-t border-th mt-auto">
        <div class="max-w-3xl mx-auto px-4 py-4 flex flex-wrap justify-between items-center gap-3 text-sm text-th-text/40">
            <span>Hecho por <span class="text-th-text font-semibold">Julián Osorio Mora</span></span>
            <div class="flex gap-4">
                <a href="https://ko-fi.com/julianosoriom" target="_blank" rel="noopener" class="hover:text-th-text transition-colors">Apoyar</a>
                <a href="https://t.me/ampliando_marcos" target="_blank" rel="noopener" class="hover:text-th-text transition-colors">Telegram</a>
            </div>
        </div>
    </footer>

    {% block modals %}{% endblock %}

    <!-- Banner de cookies -->
    <div id="cookie-banner" class="fixed bottom-0 inset-x-0 glass-panel border-t border-th p-4 z-40 hidden">
        <div class="max-w-3xl mx-auto flex flex-wrap items-center justify-between gap-3 text-sm">
            <p class="text-th-text/60">Usamos cookies para mejorar tu experiencia.
                <a href="/privacy-policy" class="text-th-accent hover:underline">Política de privacidad</a>
            </p>
            <div class="flex gap-2">
                <button id="cookie-accept" class="glass-button-primary text-xs px-4 py-1.5">Aceptar</button>
                <button id="cookie-reject" class="glass-button text-xs px-4 py-1.5">Rechazar</button>
            </div>
        </div>
    </div>
{% endblock %}
